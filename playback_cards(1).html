<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Плейбек-театр: карточки для бизнеса</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    padding: 40px 20px;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(180, 120, 80, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(80, 120, 180, 0.15) 0%, transparent 50%);
  }

  h1 {
    text-align: center;
    color: #f0e6d3;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    text-align: center;
    color: rgba(240, 230, 211, 0.5);
    font-size: 0.8rem;
    margin-bottom: 40px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap {
    perspective: 1000px;
    height: 300px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
  }

  .card-wrap:hover .card,
  .card-wrap.flipped .card {
    transform: rotateY(180deg);
  }

  .front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px 20px;
    overflow: hidden;
  }

  .front {
    background: #f0e6d3;
    color: #1a1a2e;
  }

  .back {
    transform: rotateY(180deg);
    background: #2E4057;
    color: #f0e6d3;
  }

  .card-number {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .problem-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    line-height: 1.4;
    color: #1a1a2e;
    flex-grow: 1;
    display: flex;
    align-items: center;
    padding: 12px 0;
  }

  .front-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.4;
    font-weight: 600;
  }

  .hint {
    font-size: 0.6rem;
    opacity: 0.35;
    text-align: right;
    letter-spacing: 0.05em;
  }

  .back-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    font-weight: 600;
    color: #c9a96e;
  }

  .format-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #c9a96e;
    margin: 8px 0 6px;
    line-height: 1.3;
  }

  .format-desc {
    font-size: 0.75rem;
    line-height: 1.5;
    opacity: 0.85;
    flex-grow: 1;
  }

  .duration {
    font-size: 0.65rem;
    opacity: 0.5;
    letter-spacing: 0.08em;
    margin-top: 8px;
  }

  /* Decorative elements */
  .front::before {
    content: '';
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(46, 64, 87, 0.08);
  }

  .back::before {
    content: '';
    position: absolute;
    top: -20px;
    left: -20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(201, 169, 110, 0.1);
  }

  .logo {
    text-align: center;
    margin-top: 40px;
    color: rgba(240, 230, 211, 0.2);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>Плейбек-театр для бизнеса</h1>
<p class="subtitle">Нажмите на карточку, чтобы увидеть решение</p>

<div class="grid" id="grid"></div>

<p class="logo">Театр Чернила · Playback Theatre</p>

<script>
const cards = [
  {
    problem: "Команда есть, а доверия нет",
    format: "Арт-мастер класс",
    desc: "Упражнения плейбек-театра создают живой контакт между людьми — без давления и оценок. Доверие возникает через общий опыт.",
    duration: "1–4 часа"
  },
  {
    problem: "Одни говорят, другие не слышат",
    format: "Фасилитация + ПТ",
    desc: "Плейбек буквально учит слушать: если не услышал — не сыграешь. Фасилитатор переводит опыт в практику.",
    duration: "2–4 часа"
  },
  {
    problem: "Люди работают, но не чувствуют смысла",
    format: "Спикер + ПТ",
    desc: "Спикер выводит на личные истории, плейбек делает их видимыми для всех. Люди находят свой смысл в общем деле.",
    duration: "1,5 часа"
  },
  {
    problem: "Удалённая команда — все чужие",
    format: "Перформанс",
    desc: "Живые истории создают связь быстрее любого тимбилдинга. Люди узнают себя в историях друг друга.",
    duration: "1,5–2 часа"
  },
  {
    problem: "Конфликты тлеют, никто не говорит",
    format: "Симуляция сложного разговора",
    desc: "Участники проживают сложные разговоры в безопасном пространстве. Видят ситуацию глазами другой стороны.",
    duration: "2–4 часа"
  },
  {
    problem: "Менеджеры не умеют говорить с людьми",
    format: "Мастерская 1 день",
    desc: "Глубокая работа с коммуникацией, страхами и ролями. Трансформация через личный опыт, а не теорию.",
    duration: "8 часов"
  },
  {
    problem: "Выгорание. Люди уходят",
    format: "Сериал — цикл перформансов",
    desc: "Регулярные встречи создают культуру где можно говорить о настоящем. Эмоциональный фитнес для команды.",
    duration: "Несколько встреч"
  },
  {
    problem: "Стереотипы мешают работать вместе",
    format: "Предубеждения",
    desc: "Люди рассказывают как предубеждения коснулись их самих. Эмпатия возникает естественно — через чужую историю.",
    duration: "2–4 часа"
  },
  {
    problem: "Нужен живой старт для конференции или стратсессии",
    format: "Разогрев",
    desc: "10–45 минут плейбек-упражнений — и зал уже вместе. Люди присутствуют, а не ждут перерыва.",
    duration: "10–45 минут"
  },
  {
    problem: "Сотрудники боятся говорить и выступать",
    format: "Выступление участников",
    desc: "Через плейбек-формы люди постепенно выходят на сцену. Страх публичности уходит через игру, не через тренинг.",
    duration: "2–3 часа"
  }
];

const grid = document.getElementById('grid');

cards.forEach((c, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card">
      <div class="front">
        <div>
          <div class="card-number">0${i+1}</div>
          <div class="front-label">Проблема</div>
        </div>
        <div class="problem-text">${c.problem}</div>
        <div class="hint">перевернуть →</div>
      </div>
      <div class="back">
        <div>
          <div class="back-label">Решение</div>
          <div class="format-name">${c.format}</div>
        </div>
        <div class="format-desc">${c.desc}</div>
        <div class="duration">⏱ ${c.duration}</div>
      </div>
    </div>
  `;
  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});
</script>
</body>
</html>
